<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EP2A Commercial</title>
<style>
/* ============================================================
   VARIABLES & RESET
   ============================================================ */
:root {
  --vert:       #2e7d32;
  --vert-clair: #43a047;
  --vert-dark:  #1b5e20;
  --vert-bg:    #e8f5e9;
  --noir:       #111111;
  --gris-dark:  #1e1e1e;
  --gris:       #555555;
  --gris-clair: #e0e0e0;
  --blanc:      #ffffff;
  --rouge:      #c62828;
  --orange:     #e65100;
  --bleu:       #1565c0;
  --jaune-bg:   #fff8e1;
  --rouge-bg:   #ffebee;
  --rayon:      8px;
  --ombre:      0 2px 8px rgba(0,0,0,0.12);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', Arial, sans-serif; background: #f4f4f4; color: var(--noir); min-height: 100vh; font-size: 15px; }
button { cursor: pointer; font-family: inherit; }
input, select, textarea { font-family: inherit; font-size: 14px; }
a { color: var(--vert); }

/* ============================================================
   ÉCRAN D'ACCUEIL
   ============================================================ */
#splash {
  position: fixed; inset: 0; background: var(--gris-dark);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  z-index: 9999; transition: opacity .5s;
}
#splash.hide { opacity: 0; pointer-events: none; }
.splash-logo {
  font-size: 3rem; font-weight: 900; letter-spacing: 4px;
  color: var(--vert-clair);
  text-shadow: 0 2px 20px rgba(67,160,71,.4);
  margin-bottom: 6px;
}
.splash-sub { color: #aaa; font-size: 1rem; letter-spacing: 2px; margin-bottom: 48px; text-transform: uppercase; }
#btn-enter {
  background: var(--vert); color: #fff; border: none;
  padding: 14px 48px; border-radius: 30px; font-size: 1.05rem; font-weight: 700;
  letter-spacing: 1px; transition: background .2s, transform .1s;
}
#btn-enter:hover { background: var(--vert-clair); transform: translateY(-2px); }

/* ============================================================
   LAYOUT PRINCIPAL
   ============================================================ */
#app { display: flex; flex-direction: column; min-height: 100vh; }

/* -------- HEADER -------- */
header {
  background: var(--gris-dark); color: #fff;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 24px; height: 56px; position: sticky; top: 0; z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,.3);
}
.header-logo { font-size: 1.3rem; font-weight: 900; color: var(--vert-clair); letter-spacing: 2px; }
.header-logo span { color: #fff; font-weight: 300; }
.header-actions { display: flex; gap: 8px; }
.btn-icon {
  background: none; border: 1px solid #444; color: #ccc;
  border-radius: var(--rayon); padding: 6px 12px; font-size: 13px; transition: .2s;
}
.btn-icon:hover { border-color: var(--vert-clair); color: var(--vert-clair); }

/* -------- NAV TABS -------- */
nav {
  background: var(--noir); display: flex; overflow-x: auto; gap: 0;
  border-bottom: 2px solid var(--vert);
}
nav::-webkit-scrollbar { height: 3px; }
nav::-webkit-scrollbar-thumb { background: var(--vert); }
.nav-tab {
  background: none; border: none; color: #aaa;
  padding: 12px 20px; font-size: 14px; white-space: nowrap;
  border-bottom: 3px solid transparent; margin-bottom: -2px;
  transition: color .2s, border-color .2s;
}
.nav-tab:hover { color: #fff; }
.nav-tab.active { color: var(--vert-clair); border-bottom-color: var(--vert-clair); font-weight: 600; }
.nav-tab-add {
  background: none; border: none; color: var(--vert-clair);
  padding: 12px 16px; font-size: 18px; font-weight: bold;
}

/* -------- CONTENU -------- */
main { flex: 1; padding: 24px; max-width: 1200px; width: 100%; margin: 0 auto; }

/* ============================================================
   COMPOSANTS COMMUNS
   ============================================================ */
.card {
  background: #fff; border-radius: var(--rayon);
  box-shadow: var(--ombre); padding: 20px; margin-bottom: 16px;
}
.section-title {
  font-size: 1.1rem; font-weight: 700; margin-bottom: 16px;
  color: var(--vert-dark); border-left: 4px solid var(--vert); padding-left: 10px;
}

/* Boutons */
.btn { border: none; border-radius: 6px; padding: 8px 16px; font-size: 14px; font-weight: 600; transition: .15s; }
.btn-primary { background: var(--vert); color: #fff; }
.btn-primary:hover { background: var(--vert-clair); }
.btn-secondary { background: #f0f0f0; color: var(--noir); }
.btn-secondary:hover { background: var(--gris-clair); }
.btn-danger { background: var(--rouge); color: #fff; }
.btn-danger:hover { background: #e53935; }
.btn-warn { background: var(--orange); color: #fff; }
.btn-warn:hover { background: #f57c00; }
.btn-sm { padding: 5px 10px; font-size: 12px; }

/* Badges statut */
.badge {
  display: inline-block; border-radius: 20px; padding: 2px 10px;
  font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px;
}
.badge-prospect { background: #e3f2fd; color: #1565c0; }
.badge-actif    { background: #e8f5e9; color: var(--vert-dark); }
.badge-ancien   { background: #f3e5f5; color: #6a1b9a; }
.badge-visiter  { background: #fff9c4; color: #f57f17; }
.badge-visite   { background: var(--vert-bg); color: var(--vert-dark); }
.badge-relancer { background: var(--rouge-bg); color: var(--rouge); }
.badge-commande { background: #e3f2fd; color: var(--bleu); }
.badge-regulier { background: #e8f5e9; color: var(--vert-dark); }
.badge-faible  { background: #f5f5f5; color: #666; }
.badge-moyen   { background: #fff8e1; color: #e65100; }
.badge-fort    { background: #ffebee; color: var(--rouge); }

/* ============================================================
   TABLEAU DE BORD
   ============================================================ */
.dashboard-kpis {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px;
}
.kpi-card {
  background: #fff; border-radius: var(--rayon); box-shadow: var(--ombre);
  padding: 20px; border-left: 5px solid var(--vert); text-align: center;
}
.kpi-card.orange { border-left-color: var(--orange); }
.kpi-card.rouge  { border-left-color: var(--rouge); }
.kpi-card.bleu   { border-left-color: var(--bleu); }
.kpi-val { font-size: 2.4rem; font-weight: 900; color: var(--vert-dark); line-height: 1; }
.kpi-card.orange .kpi-val { color: var(--orange); }
.kpi-card.rouge  .kpi-val { color: var(--rouge); }
.kpi-card.bleu   .kpi-val { color: var(--bleu); }
.kpi-label { font-size: 13px; color: var(--gris); margin-top: 6px; }

/* Relances du jour */
.relance-alerte {
  background: var(--rouge-bg); border: 1px solid #ef9a9a;
  border-radius: var(--rayon); padding: 12px 16px; margin-bottom: 16px;
  display: flex; align-items: center; gap: 10px;
}
.relance-alerte .icon { font-size: 1.4rem; }

/* ============================================================
   LISTE GARAGES
   ============================================================ */
.toolbar {
  display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 18px; align-items: center;
}
.search-box {
  flex: 1; min-width: 200px; padding: 9px 14px;
  border: 1px solid var(--gris-clair); border-radius: 6px;
  outline: none; transition: border .2s;
}
.search-box:focus { border-color: var(--vert); }
select.filter {
  padding: 9px 14px; border: 1px solid var(--gris-clair);
  border-radius: 6px; background: #fff; outline: none;
}
select.filter:focus { border-color: var(--vert); }

/* Grille de cartes garages */
.garages-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px;
}
.garage-card {
  background: #fff; border-radius: var(--rayon); box-shadow: var(--ombre);
  padding: 18px; border-top: 4px solid var(--vert);
  transition: box-shadow .2s, transform .15s;
}
.garage-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,.15); transform: translateY(-2px); }
.garage-card.relance-today { border-top-color: var(--rouge); background: #fff9f9; }
.garage-card.relance-past  { border-top-color: var(--orange); }
.garage-name { font-size: 1rem; font-weight: 800; color: var(--noir); margin-bottom: 4px; }
.garage-contact { font-size: 13px; color: var(--gris); margin-bottom: 8px; }
.garage-info { font-size: 13px; color: var(--gris); margin-bottom: 2px; }
.garage-badges { display: flex; flex-wrap: wrap; gap: 5px; margin: 10px 0; }
.garage-dates { font-size: 12px; color: var(--gris); margin-top: 8px; }
.garage-dates span { font-weight: 600; color: var(--noir); }
.garage-actions { display: flex; gap: 6px; margin-top: 12px; flex-wrap: wrap; }
.empty-state {
  text-align: center; padding: 60px 20px; color: var(--gris);
}
.empty-state .big { font-size: 3rem; margin-bottom: 10px; }

/* ============================================================
   MODALES
   ============================================================ */
.modal-backdrop {
  position: fixed; inset: 0; background: rgba(0,0,0,.55);
  z-index: 500; display: flex; align-items: center; justify-content: center;
  padding: 16px;
}
.modal-backdrop.hidden { display: none; }
.modal {
  background: #fff; border-radius: var(--rayon); box-shadow: 0 8px 40px rgba(0,0,0,.25);
  width: 100%; max-width: 680px; max-height: 90vh; overflow-y: auto;
}
.modal-header {
  background: var(--gris-dark); color: #fff;
  padding: 16px 20px; display: flex; justify-content: space-between; align-items: center;
  border-radius: var(--rayon) var(--rayon) 0 0; position: sticky; top: 0; z-index: 1;
}
.modal-title { font-size: 1rem; font-weight: 700; }
.btn-close { background: none; border: none; color: #aaa; font-size: 22px; line-height: 1; }
.btn-close:hover { color: #fff; }
.modal-body { padding: 20px; }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.form-group { display: flex; flex-direction: column; gap: 5px; }
.form-group.full { grid-column: 1 / -1; }
label { font-size: 13px; font-weight: 600; color: var(--gris); }
.form-control {
  padding: 9px 12px; border: 1px solid var(--gris-clair);
  border-radius: 6px; outline: none; transition: border .2s;
}
.form-control:focus { border-color: var(--vert); }
textarea.form-control { resize: vertical; min-height: 70px; }
.modal-footer {
  padding: 14px 20px; border-top: 1px solid var(--gris-clair);
  display: flex; justify-content: flex-end; gap: 10px; position: sticky; bottom: 0;
  background: #fff; border-radius: 0 0 var(--rayon) var(--rayon);
}

/* ============================================================
   DÉTAIL GARAGE (vue)
   ============================================================ */
.detail-header {
  display: flex; justify-content: space-between; align-items: flex-start;
  margin-bottom: 20px; gap: 16px; flex-wrap: wrap;
}
.detail-name { font-size: 1.5rem; font-weight: 900; color: var(--noir); }
.detail-actions { display: flex; gap: 8px; flex-wrap: wrap; }
.info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.info-item label { font-size: 12px; color: var(--gris); display: block; margin-bottom: 2px; }
.info-item p { font-size: 14px; color: var(--noir); font-weight: 500; }
.info-item.full { grid-column: 1/-1; }

/* Historique visites */
.visite-item {
  border: 1px solid var(--gris-clair); border-radius: 6px; padding: 14px;
  margin-bottom: 10px; border-left: 4px solid var(--vert);
}
.visite-date { font-weight: 700; color: var(--vert-dark); margin-bottom: 6px; }
.visite-row { font-size: 13px; margin-bottom: 3px; color: var(--gris); }
.visite-row strong { color: var(--noir); }
.visite-actions { margin-top: 8px; display: flex; gap: 6px; }

/* ============================================================
   SECTEURS (gestion)
   ============================================================ */
.secteur-list { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; }
.secteur-chip {
  background: var(--vert-bg); border: 1px solid var(--vert); border-radius: 20px;
  padding: 6px 16px; font-size: 13px; font-weight: 600; color: var(--vert-dark);
  display: flex; align-items: center; gap: 8px;
}
.secteur-chip button { background: none; border: none; color: var(--rouge); font-size: 15px; cursor: pointer; }


/* ============================================================
   LOGO EP2A
   ============================================================ */
.brand-wrap { display:flex; align-items:center; gap:10px; min-width:0; }
.ep2a-logo-badge {
  display:flex; align-items:center; gap:8px; background:#fff; color:var(--noir);
  border-radius:10px; padding:5px 10px; font-weight:900; letter-spacing:.8px;
  box-shadow: inset 0 0 0 2px var(--vert-clair); white-space:nowrap;
}
.ep2a-logo-badge .logo-ep { color:var(--vert-dark); font-size:1.05rem; }
.ep2a-logo-badge .logo-name { color:var(--noir); font-size:.68rem; font-weight:800; line-height:1.05; }
.header-title-text { font-size:.95rem; color:#fff; font-weight:700; letter-spacing:.5px; }

/* ============================================================
   PLANNING TOURNÉES
   ============================================================ */
.planning-toolbar { display:flex; flex-wrap:wrap; gap:10px; align-items:center; margin-bottom:16px; }
.planning-list { display:grid; gap:12px; }
.planning-card {
  background:#fff; border-radius:var(--rayon); box-shadow:var(--ombre); padding:16px;
  border-left:5px solid var(--vert);
}
.planning-card.today { border-left-color:var(--orange); background:#fffaf0; }
.planning-card.late { border-left-color:var(--rouge); background:#fff9f9; }
.planning-head { display:flex; justify-content:space-between; gap:10px; flex-wrap:wrap; margin-bottom:8px; }
.planning-title { font-weight:900; font-size:1rem; color:var(--noir); }
.planning-meta { color:var(--gris); font-size:13px; margin-top:3px; }
.planning-actions { display:flex; gap:6px; flex-wrap:wrap; }
.planning-note { font-size:13px; color:var(--gris); white-space:pre-line; margin-top:8px; }
.badge-planifie { background:#e3f2fd; color:var(--bleu); }
.badge-fait { background:var(--vert-bg); color:var(--vert-dark); }
.badge-annule { background:#f5f5f5; color:#666; }
.badge-urgent { background:var(--rouge-bg); color:var(--rouge); }
@media (max-width: 700px) {
  header { height:auto; min-height:64px; padding:8px 12px; flex-wrap:wrap; gap:8px; }
  .header-title-text { display:none; }
  .ep2a-logo-badge .logo-name { display:none; }
}

/* ============================================================
   RESPONSIVE
   ============================================================ */
@media (max-width: 600px) {
  main { padding: 12px; }
  .form-grid { grid-template-columns: 1fr; }
  .info-grid  { grid-template-columns: 1fr; }
  .dashboard-kpis { grid-template-columns: 1fr 1fr; }
  .garages-grid { grid-template-columns: 1fr; }
  .modal { max-height: 95vh; }
}

/* ============================================================
   SCROLL
   ============================================================ */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: #f0f0f0; }
::-webkit-scrollbar-thumb { background: var(--vert); border-radius: 3px; }
</style>
</head>
<body>

<!-- Application ouverte directement -->
<!-- ===== APPLICATION ===== -->
<div id="app">

  <!-- HEADER -->
  <header>
    <div class="brand-wrap">
      <div class="ep2a-logo-badge">
        <span class="logo-ep">EP2A</span>
        <span class="logo-name">Espace Pièce<br>Auto Aveyron</span>
      </div>
      <div class="header-title-text">Commercial</div>
    </div>
  </header>

  <!-- NAV TABS -->
  <nav id="nav-tabs">
    <button class="nav-tab active" data-view="dashboard" onclick="switchView('dashboard', this)">🏠 Tableau de bord</button>
    <button class="nav-tab" data-view="planning"  onclick="switchView('planning', this)">🗓 Planning tournées</button>
    <button class="nav-tab" data-view="garages"   onclick="switchView('garages', this)">🏢 Tous les garages</button>
    <button class="nav-tab" data-view="secteurs"  onclick="switchView('secteurs', this)">⚙ Secteurs</button>
    <button class="nav-tab" data-view="relances"  onclick="switchView('relances', this)">🔔 Relances</button>
  </nav>

  <!-- MAIN CONTENT -->
  <main id="main-content"></main>

</div>

<!-- ===== MODAL GARAGE (ajout / édition) ===== -->
<div class="modal-backdrop hidden" id="modal-garage">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modal-garage-title">Ajouter un garage</span>
      <button class="btn-close" onclick="closeModal('modal-garage')">×</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="g-id">
      <div class="form-grid">
        <div class="form-group">
          <label>Nom du garage *</label>
          <input class="form-control" id="g-nom" placeholder="Garage Martin" required>
        </div>
        <div class="form-group">
          <label>Secteur *</label>
          <select class="form-control" id="g-secteur"></select>
        </div>
        <div class="form-group">
          <label>Nom du contact</label>
          <input class="form-control" id="g-contact" placeholder="Jean Martin">
        </div>
        <div class="form-group">
          <label>Téléphone</label>
          <input class="form-control" id="g-tel" placeholder="06 00 00 00 00">
        </div>
        <div class="form-group">
          <label>Email</label>
          <input class="form-control" id="g-email" type="email" placeholder="contact@garage.fr">
        </div>
        <div class="form-group">
          <label>Ville</label>
          <input class="form-control" id="g-ville" placeholder="Rodez">
        </div>
        <div class="form-group full">
          <label>Adresse</label>
          <input class="form-control" id="g-adresse" placeholder="12 rue des Artisans">
        </div>
        <div class="form-group">
          <label>Type de client</label>
          <select class="form-control" id="g-type">
            <option value="prospect">Prospect</option>
            <option value="actif">Client actif</option>
            <option value="ancien">Ancien client</option>
          </select>
        </div>
        <div class="form-group">
          <label>Potentiel</label>
          <select class="form-control" id="g-potentiel">
            <option value="faible">Faible</option>
            <option value="moyen">Moyen</option>
            <option value="fort">Fort</option>
          </select>
        </div>
        <div class="form-group">
          <label>Statut</label>
          <select class="form-control" id="g-statut">
            <option value="a-visiter">À visiter</option>
            <option value="visite">Visité</option>
            <option value="a-relancer">À relancer</option>
            <option value="commande">Commande en attente</option>
            <option value="regulier">Client régulier</option>
          </select>
        </div>
        <div class="form-group">
          <label>Dernière visite</label>
          <input class="form-control" id="g-derniere" type="date">
        </div>
        <div class="form-group">
          <label>Prochaine relance</label>
          <input class="form-control" id="g-relance" type="date">
        </div>
        <div class="form-group full">
          <label>Marques / Produits demandés</label>
          <input class="form-control" id="g-produits" placeholder="Huile Motul, filtres MANN...">
        </div>
        <div class="form-group full">
          <label>Besoins du client</label>
          <textarea class="form-control" id="g-besoins" placeholder="Besoins identifiés..."></textarea>
        </div>
        <div class="form-group full">
          <label>Observations commerciales</label>
          <textarea class="form-control" id="g-obs" placeholder="Notes importantes..."></textarea>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('modal-garage')">Annuler</button>
      <button class="btn btn-primary" onclick="saveGarage()">💾 Enregistrer</button>
    </div>
  </div>
</div>

<!-- ===== MODAL VISITE ===== -->
<div class="modal-backdrop hidden" id="modal-visite">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modal-visite-title">Ajouter une visite</span>
      <button class="btn-close" onclick="closeModal('modal-visite')">×</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="v-garage-id">
      <input type="hidden" id="v-visite-id">
      <div class="form-grid">
        <div class="form-group">
          <label>Date de visite *</label>
          <input class="form-control" id="v-date" type="date" required>
        </div>
        <div class="form-group">
          <label>Prochaine relance</label>
          <input class="form-control" id="v-relance" type="date">
        </div>
        <div class="form-group full">
          <label>Résumé de l'échange</label>
          <textarea class="form-control" id="v-resume" placeholder="Discussion sur..."></textarea>
        </div>
        <div class="form-group full">
          <label>Produits proposés</label>
          <textarea class="form-control" id="v-produits" placeholder="Huile 5W40, filtre à air..."></textarea>
        </div>
        <div class="form-group full">
          <label>Réponse du client</label>
          <textarea class="form-control" id="v-reponse" placeholder="Intéressé par... / Refus car..."></textarea>
        </div>
        <div class="form-group full">
          <label>Action à faire ensuite</label>
          <textarea class="form-control" id="v-action" placeholder="Envoyer devis, rappeler le..."></textarea>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('modal-visite')">Annuler</button>
      <button class="btn btn-primary" onclick="saveVisite()">💾 Enregistrer</button>
    </div>
  </div>
</div>

<!-- ===== MODAL DÉTAIL GARAGE ===== -->
<div class="modal-backdrop hidden" id="modal-detail">
  <div class="modal" style="max-width:780px">
    <div class="modal-header">
      <span class="modal-title">Fiche garage</span>
      <button class="btn-close" onclick="closeModal('modal-detail')">×</button>
    </div>
    <div class="modal-body" id="modal-detail-body"></div>
  </div>
</div>


<!-- ===== MODAL PLANNING TOURNÉE ===== -->
<div class="modal-backdrop hidden" id="modal-planning">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modal-planning-title">Ajouter une tournée</span>

/* ============================================================
   INITIALISATION
   ============================================================ */
function init() {
  const saved = localStorage.getItem(STORAGE_KEY);
  if (saved) {
    try { data = JSON.parse(saved); }
    catch(e) { console.error('Erreur chargement données', e); }
    if (!Array.isArray(data.planning)) data.planning = [];
    if (!Array.isArray(data.secteurs)) data.secteurs = ['Rodez', 'Millau', 'Decazeville', 'Villefranche', 'Autre'];
    if (!Array.isArray(data.garages)) data.garages = [];
    save();
  } else {
    data.garages = EXEMPLES;
    data.planning = [];
    save();
  }
}

function save() {
  data.lastSaved = new Date().toISOString();
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

function uid() {
  return 'id' + Date.now() + Math.random().toString(36).slice(2,6);
}

/* ============================================================
   NAVIGATION
   ============================================================ */
function switchView(view, btn) {
  currentView = view;
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  if (btn) btn.classList.add('active');
  renderView();
}

function renderView() {
  const main = document.getElementById('main-content');
  if      (currentView === 'dashboard') main.innerHTML = renderDashboard();
  else if (currentView === 'garages')   main.innerHTML = renderGarages();
  else if (currentView === 'relances')  main.innerHTML = renderRelances();
  else if (currentView === 'planning')  main.innerHTML = renderPlanning();
  else if (currentView === 'secteurs')  main.innerHTML = renderSecteurs();
}

/* ============================================================
   TABLEAU DE BORD
   ============================================================ */
function renderDashboard() {
  const today = todayStr();
  const moisCourant = today.slice(0, 7); // YYYY-MM
  const total = data.garages.length;
  const visiteMois = data.garages.filter(g => g.derniere && g.derniere.startsWith(moisCourant)).length;
  const aRelancer  = data.garages.filter(g => g.relance && g.relance <= today).length;
  const commandes  = data.garages.filter(g => g.statut === 'commande').length;
  const tourneesJour = (data.planning || []).filter(p => p.date === today && p.statut !== 'annule').length;

  // Garages à relancer aujourd'hui ou avant
  const relancesUrgentes = data.garages.filter(g => g.relance && g.relance <= today)
    .sort((a,b) => a.relance.localeCompare(b.relance));

  // Dernières visites
  const dernieres = [...data.garages]
    .filter(g => g.derniere)
    .sort((a,b) => b.derniere.localeCompare(a.derniere))
    .slice(0, 5);

  let alerteHTML = '';
  if (relancesUrgentes.length > 0) {
    alerteHTML = `<div class="relance-alerte">
      <span class="icon">🔔</span>
      <div><strong>${relancesUrgentes.length} garage(s) à relancer aujourd'hui ou en retard !</strong>
      <div style="margin-top:6px;display:flex;flex-wrap:wrap;gap:8px;">
        ${relancesUrgentes.map(g => `<button class="btn btn-sm btn-danger" onclick="openDetail('${g.id}')">${g.nom}</button>`).join('')}
      </div></div>
    </div>`;
  }

  let dernViHTML = dernieres.length === 0 ? '<p style="color:var(--gris)">Aucune visite enregistrée.</p>' :
    dernieres.map(g => `
      <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--gris-clair)">
        <div>
          <strong>${g.nom}</strong> <span style="color:var(--gris);font-size:13px">— ${g.ville}</span>
          <div style="font-size:12px;color:var(--gris)">${g.contact || ''}</div>
        </div>
        <div style="text-align:right">
          <span style="font-size:13px;font-weight:600;color:var(--vert-dark)">${formatDate(g.derniere)}</span><br>
          <button class="btn btn-sm btn-secondary" onclick="openDetail('${g.id}')">Voir</button>
        </div>
      </div>`).join('');

  return `
    ${alerteHTML}
    <div class="dashboard-kpis">
      <div class="kpi-card">
        <div class="kpi-val">${total}</div>
        <div class="kpi-label">🏢 Garages enregistrés</div>
      </div>
      <div class="kpi-card bleu">
        <div class="kpi-val">${visiteMois}</div>
        <div class="kpi-label">📅 Visites ce mois-ci</div>
      </div>
      <div class="kpi-card rouge">
        <div class="kpi-val">${aRelancer}</div>
        <div class="kpi-label">🔔 À relancer</div>
      </div>
      <div class="kpi-card orange">
        <div class="kpi-val">${commandes}</div>
        <div class="kpi-label">📦 Commandes en attente</div>
      </div>
      <div class="kpi-card bleu">
        <div class="kpi-val">${tourneesJour}</div>
        <div class="kpi-label">🗓 Tournées aujourd'hui</div>
      </div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px" class="dash-grid">
      <div class="card">
        <div class="section-title">Dernières visites</div>
        ${dernViHTML}
      </div>
      <div class="card">
        <div class="section-title">Répartition par secteur</div>
        ${renderSecteurStats()}
      </div>
    </div>

    <div class="card" style="margin-top:16px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <div class="section-title" style="margin:0">Actions rapides</div>
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:10px">
        <button class="btn btn-primary" onclick="openModalGarage()">➕ Ajouter un garage</button>
        <button class="btn btn-warn" onclick="switchView('relances', null);renderView()">🔔 Voir les relances</button>
        <button class="btn btn-primary" onclick="openModalPlanning()">🗓 Ajouter une tournée</button>
        <button class="btn btn-secondary" onclick="switchView('garages', null);renderView()">🏢 Tous les garages</button>
      </div>
    </div>`;
}

function renderSecteurStats() {
  if (data.secteurs.length === 0) return '<p style="color:var(--gris)">Aucun secteur défini.</p>';
  return data.secteurs.map(s => {
    const n = data.garages.filter(g => g.secteur === s).length;
    const pct = data.garages.length ? Math.round(n / data.garages.length * 100) : 0;
    return `<div style="margin-bottom:10px">
      <div style="display:flex;justify-content:space-between;margin-bottom:4px">
        <span style="font-size:13px;font-weight:600">${s}</span>
        <span style="font-size:13px;color:var(--gris)">${n} garage${n>1?'s':''}</span>
      </div>
      <div style="background:var(--gris-clair);border-radius:10px;height:8px">
        <div style="background:var(--vert);width:${pct}%;height:8px;border-radius:10px;transition:.4s"></div>
      </div>
    </div>`;
  }).join('');
}

/* ============================================================
   VUE GARAGES
   ============================================================ */
function renderGarages(params = {}) {
  const { search = '', secteur = '', statut = '', potentiel = '', type = '', semaineRelance = false } = params;
  const todayDate = new Date(todayStr());
  const semainePlus7 = new Date(todayDate); semainePlus7.setDate(todayDate.getDate() + 7);

  let garages = data.garages.filter(g => {
    if (search) {
      const q = search.toLowerCase();
      if (!((g.nom||'').toLowerCase().includes(q) || (g.ville||'').toLowerCase().includes(q) ||
            (g.contact||'').toLowerCase().includes(q) || (g.tel||'').toLowerCase().includes(q))) return false;
    }
    if (secteur   && g.secteur   !== secteur)   return false;
    if (statut    && g.statut    !== statut)     return false;
    if (potentiel && g.potentiel !== potentiel)  return false;
    if (type      && g.type      !== type)       return false;
    if (semaineRelance && g.relance) {
      const rd = new Date(g.relance);
      if (rd > semainePlus7) return false;
    } else if (semaineRelance && !g.relance) return false;
    return true;
  });

  garages.sort((a,b) => {
    if (a.relance && b.relance) return a.relance.localeCompare(b.relance);
    if (a.relance) return -1;
    if (b.relance) return 1;
    return (a.nom||'').localeCompare(b.nom||'');
  });

  const secOpts = data.secteurs.map(s => `<option value="${s}" ${secteur===s?'selected':''}>${s}</option>`).join('');
  const statutOpts = `
    <option value="">Tous statuts</option>
    <option value="a-visiter" ${statut==='a-visiter'?'selected':''}>À visiter</option>
    <option value="visite" ${statut==='visite'?'selected':''}>Visité</option>
    <option value="a-relancer" ${statut==='a-relancer'?'selected':''}>À relancer</option>
    <option value="commande" ${statut==='commande'?'selected':''}>Commande en attente</option>
    <option value="regulier" ${statut==='regulier'?'selected':''}>Client régulier</option>`;
  const potOpts = `
    <option value="">Tout potentiel</option>
    <option value="faible" ${potentiel==='faible'?'selected':''}>Faible</option>
    <option value="moyen" ${potentiel==='moyen'?'selected':''}>Moyen</option>
    <option value="fort" ${potentiel==='fort'?'selected':''}>Fort</option>`;
  const typeOpts = `
    <option value="">Tous types</option>
    <option value="prospect" ${type==='prospect'?'selected':''}>Prospect</option>
    <option value="actif" ${type==='actif'?'selected':''}>Client actif</option>
    <option value="ancien" ${type==='ancien'?'selected':''}>Ancien client</option>`;

  const cardsHTML = garages.length === 0
    ? `<div class="empty-state"><div class="big">🏢</div><p>Aucun garage trouvé.</p>
        <button class="btn btn-primary" style="margin-top:12px" onclick="openModalGarage()">Ajouter un garage</button></div>`
    : `<div class="garages-grid">${garages.map(g => renderGarageCard(g)).join('')}</div>`;

  return `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:10px">
      <h2 style="font-size:1.2rem;font-weight:800">Garages <span style="color:var(--gris);font-weight:400">(${garages.length})</span></h2>
      <button class="btn btn-primary" onclick="openModalGarage()">➕ Ajouter un garage</button>
    </div>
    <div class="toolbar" id="toolbar-garages">
      <input class="search-box" placeholder="🔍 Rechercher (nom, ville, contact, tél…)" value="${escHtml(search)}"
        oninput="applyFilters()" id="search-input">
      <select class="filter" id="f-secteur" onchange="applyFilters()">
        <option value="">Tous secteurs</option>${secOpts}
      </select>
      <select class="filter" id="f-statut" onchange="applyFilters()">${statutOpts}</select>
      <select class="filter" id="f-potentiel" onchange="applyFilters()">${potOpts}</select>
      <select class="filter" id="f-type" onchange="applyFilters()">${typeOpts}</select>
      <label style="display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer">
        <input type="checkbox" id="f-semaine" onchange="applyFilters()" ${semaineRelance?'checked':''}> Relances semaine
      </label>
    </div>
    ${cardsHTML}`;
}

function applyFilters() {
  const params = {
    search:         document.getElementById('search-input')?.value || '',
    secteur:        document.getElementById('f-secteur')?.value || '',
    statut:         document.getElementById('f-statut')?.value || '',
    potentiel:      document.getElementById('f-potentiel')?.value || '',
    type:           document.getElementById('f-type')?.value || '',
    semaineRelance: document.getElementById('f-semaine')?.checked || false
  };
  document.getElementById('main-content').innerHTML = renderGarages(params);
}

function renderGarageCard(g) {
  const today = todayStr();
  let cls = '';
  if (g.relance === today) cls = 'relance-today';
  else if (g.relance && g.relance < today) cls = 'relance-past';

  const badges = [
    `<span class="badge badge-${g.type}">${typeLabel(g.type)}</span>`,
    `<span class="badge badge-${g.statut}">${statutLabel(g.statut)}</span>`,
    `<span class="badge badge-${g.potentiel}">⚡ ${potentielLabel(g.potentiel)}</span>`
  ].join('');

  const relanceWarn = g.relance && g.relance <= today
    ? `<div style="color:var(--rouge);font-size:12px;font-weight:700;margin-top:4px">🔔 Relance : ${formatDate(g.relance)}</div>` : '';

  return `<div class="garage-card ${cls}">
    <div class="garage-name">${escHtml(g.nom)}</div>
    <div class="garage-contact">👤 ${escHtml(g.contact || '—')} · ${escHtml(g.ville || '—')}</div>
    ${g.tel ? `<div class="garage-info">📞 ${escHtml(g.tel)}</div>` : ''}
    <div class="garage-badges">${badges}</div>
    <div class="garage-dates">
      Dernière visite : <span>${formatDate(g.derniere) || '—'}</span>
      ${g.relance && g.relance > today ? ` · Relance : <span>${formatDate(g.relance)}</span>` : ''}
    </div>
    ${relanceWarn}
    <div class="garage-actions">
      <button class="btn btn-sm btn-primary" onclick="openDetail('${g.id}')">📋 Fiche</button>
      <button class="btn btn-sm btn-secondary" onclick="openModalGarage('${g.id}')">✏ Modifier</button>
      <button class="btn btn-sm btn-warn" onclick="openModalVisite('${g.id}')">+ Visite</button>
      <button class="btn btn-sm btn-danger" onclick="deleteGarage('${g.id}')">🗑</button>
    </div>
  </div>`;
}

/* ============================================================
   VUE RELANCES
   ============================================================ */
function renderRelances() {
  const today = todayStr();
  const semainePlus7 = new Date(today); semainePlus7.setDate(semainePlus7.getDate() + 7);
  const s7 = semainePlus7.toISOString().split('T')[0];

  const retard    = data.garages.filter(g => g.relance && g.relance < today).sort((a,b)=>a.relance.localeCompare(b.relance));
  const aujourdhui= data.garages.filter(g => g.relance === today);
  const semaine   = data.garages.filter(g => g.relance && g.relance > today && g.relance <= s7).sort((a,b)=>a.relance.localeCompare(b.relance));

  const section = (titre, list, color) => {
    if (list.length === 0) return `<p style="color:var(--gris);margin-bottom:4px">Aucun.</p>`;
    return list.map(g => `
      <div class="garage-card" style="border-top-color:${color};margin-bottom:10px">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px">
          <div>
            <div class="garage-name">${escHtml(g.nom)}</div>
            <div class="garage-contact">👤 ${escHtml(g.contact||'—')} · ${escHtml(g.ville||'—')}</div>
            ${g.tel?`<div class="garage-info">📞 <a href="tel:${escHtml(g.tel)}">${escHtml(g.tel)}</a></div>`:''}
            <div style="margin-top:6px"><span style="color:${color};font-weight:700">Relance : ${formatDate(g.relance)}</span></div>
          </div>
          <div style="display:flex;gap:6px;flex-wrap:wrap">
            <button class="btn btn-sm btn-primary" onclick="openDetail('${g.id}')">📋 Fiche</button>

function clearRelance(id) {
  const g = data.garages.find(x => x.id === id);
  if (!g) return;
  if (!confirm('Supprimer cette relance ? Le garage restera enregistré.')) return;

  save();
  renderView();
}


/* ============================================================
   VUE PLANNING TOURNÉES
   ============================================================ */
function renderPlanning(params = {}) {
  const today = todayStr();
  const { date = '', secteur = '', statut = '' } = params;
  let list = [...(data.planning || [])];
  if (date) list = list.filter(p => p.date === date);
  if (secteur) list = list.filter(p => p.secteur === secteur);
  if (statut) list = list.filter(p => p.statut === statut);
  list.sort((a,b) => (a.date + (a.heure||'')).localeCompare(b.date + (b.heure||'')));

  const secOpts = data.secteurs.map(s => `<option value="${escHtml(s)}" ${secteur===s?'selected':''}>${escHtml(s)}</option>`).join('');
  const cards = list.length === 0 ? `<div class="empty-state"><div class="big">🗓</div><p>Aucune tournée prévue.</p><button class="btn btn-primary" style="margin-top:12px" onclick="openModalPlanning()">Ajouter une tournée</button></div>` :
    `<div class="planning-list">${list.map(p => renderPlanningCard(p)).join('')}</div>`;

  return `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:10px">
      <h2 style="font-size:1.2rem;font-weight:800">🗓 Planning tournées <span style="color:var(--gris);font-weight:400">(${list.length})</span></h2>
      <button class="btn btn-primary" onclick="openModalPlanning()">➕ Ajouter une tournée</button>
    </div>
    <div class="planning-toolbar">
      <input class="form-control" id="p-filter-date" type="date" value="${escHtml(date)}" onchange="applyPlanningFilters()">
      <select class="filter" id="p-filter-secteur" onchange="applyPlanningFilters()">
        <option value="">Tous secteurs</option>${secOpts}
      </select>
      <select class="filter" id="p-filter-statut" onchange="applyPlanningFilters()">
        <option value="">Tous statuts</option>
        <option value="planifie" ${statut==='planifie'?'selected':''}>Planifié</option>
        <option value="urgent" ${statut==='urgent'?'selected':''}>Urgent</option>
        <option value="fait" ${statut==='fait'?'selected':''}>Fait</option>
        <option value="annule" ${statut==='annule'?'selected':''}>Annulé</option>
      </select>
      <button class="btn btn-secondary" onclick="document.getElementById('p-filter-date').value=todayStr();applyPlanningFilters()">Aujourd'hui</button>
    </div>
    ${cards}`;
}

function applyPlanningFilters() {
  const params = {
    date: document.getElementById('p-filter-date')?.value || '',
    secteur: document.getElementById('p-filter-secteur')?.value || '',
    statut: document.getElementById('p-filter-statut')?.value || ''
  };
  document.getElementById('main-content').innerHTML = renderPlanning(params);
}

function renderPlanningCard(p) {
  const g = data.garages.find(x => x.id === p.garageId);
  const garageNom = g ? g.nom : (p.garageNom || 'Garage supprimé');
  const today = todayStr();
  let extra = p.date === today ? 'today' : (p.date < today && p.statut !== 'fait' && p.statut !== 'annule' ? 'late' : '');
  return `<div class="planning-card ${extra}">
    <div class="planning-head">
      <div>
        <div class="planning-title">${formatDate(p.date)} ${p.heure ? 'à ' + escHtml(p.heure) : ''} · ${escHtml(garageNom)}</div>
        <div class="planning-meta">${escHtml(p.secteur || '—')} · ${typePlanningLabel(p.type)} · <span class="badge badge-${p.statut}">${statutPlanningLabel(p.statut)}</span></div>
      </div>
      <div class="planning-actions">
        ${g ? `<button class="btn btn-sm btn-primary" onclick="openDetail('${g.id}')">📋 Fiche</button>` : ''}
        ${g ? `<button class="btn btn-sm btn-warn" onclick="openModalVisite('${g.id}')">+ Visite</button>` : ''}
        <button class="btn btn-sm btn-secondary" onclick="openModalPlanning('${p.id}')">✏ Modifier</button>
        <button class="btn btn-sm btn-danger" onclick="deletePlanning('${p.id}')">🗑</button>
      </div>
    </div>
    ${p.objectif ? `<div class="planning-note"><strong>Objectif :</strong> ${escHtml(p.objectif)}</div>` : ''}
    ${p.notes ? `<div class="planning-note"><strong>Notes :</strong> ${escHtml(p.notes)}</div>` : ''}
  </div>`;
}

function openModalPlanning(id = null) {
  const p = id ? (data.planning || []).find(x => x.id === id) : null;
  document.getElementById('modal-planning-title').textContent = p ? 'Modifier la tournée' : 'Ajouter une tournée';
  document.getElementById('p-id').value = id || '';
  document.getElementById('p-date').value = p?.date || todayStr();
  document.getElementById('p-heure').value = p?.heure || '';
  document.getElementById('p-type').value = p?.type || 'prospection';
  document.getElementById('p-statut').value = p?.statut || 'planifie';
  document.getElementById('p-objectif').value = p?.objectif || '';
  document.getElementById('p-notes').value = p?.notes || '';

  const garageSel = document.getElementById('p-garage');
  garageSel.innerHTML = data.garages
    .sort((a,b)=>(a.nom||'').localeCompare(b.nom||''))
    .map(g => `<option value="${g.id}" ${p && p.garageId===g.id ? 'selected':''}>${escHtml(g.nom)} — ${escHtml(g.ville||'')}</option>`).join('');

  const secteurSel = document.getElementById('p-secteur');
  secteurSel.innerHTML = data.secteurs.map(s => `<option value="${escHtml(s)}" ${p && p.secteur===s ? 'selected':''}>${escHtml(s)}</option>`).join('');

  if (!p && data.garages.length) {
    const first = data.garages.find(g => g.id === garageSel.value);
    if (first) secteurSel.value = first.secteur || secteurSel.value;
  }
  garageSel.onchange = () => {
    const g = data.garages.find(x => x.id === garageSel.value);
    if (g) secteurSel.value = g.secteur || secteurSel.value;
  };
  openModal('modal-planning');
}

function savePlanning() {
  const date = document.getElementById('p-date').value;
  const garageId = document.getElementById('p-garage').value;
  if (!date) { alert('La date est obligatoire.'); return; }
  if (!garageId) { alert('Choisis un garage ou crée-le avant de le mettre au planning.'); return; }
  const id = document.getElementById('p-id').value || uid();
  const g = data.garages.find(x => x.id === garageId);
  const item = {
    id,
    date,
    heure: document.getElementById('p-heure').value,
    garageId,
    garageNom: g?.nom || '',
    secteur: document.getElementById('p-secteur').value,
    type: document.getElementById('p-type').value,
    statut: document.getElementById('p-statut').value,
    objectif: document.getElementById('p-objectif').value.trim(),
    notes: document.getElementById('p-notes').value.trim()
  };
  if (!Array.isArray(data.planning)) data.planning = [];
  const existing = data.planning.find(x => x.id === id);
  if (existing) Object.assign(existing, item); else data.planning.push(item);
  save();
  closeModal('modal-planning');
  renderView();
}

function deletePlanning(id) {
  if (!confirm('Supprimer cette tournée du planning ?')) return;
  data.planning = (data.planning || []).filter(p => p.id !== id);
  save();
  renderView();
}

function saveVisite() {
  const garageId = document.getElementById('v-garage-id').value;
  const visiteId = document.getElementById('v-visite-id').value;
  const date = document.getElementById('v-date').value;
  if (!date) { alert('La date est obligatoire.'); return; }

  const g = data.garages.find(x => x.id === garageId);
  if (!g) return;
  if (!g.visites) g.visites = [];

  const visite = {
    id:       visiteId || uid(),
    date,
    resume:   document.getElementById('v-resume').value.trim(),
    produits: document.getElementById('v-produits').value.trim(),
    reponse:  document.getElementById('v-reponse').value.trim(),
    action:   document.getElementById('v-action').value.trim(),
    relance:  document.getElementById('v-relance').value
  };

  // Met à jour le garage avec la dernière date et la prochaine relance
  const existing = g.visites.find(x => x.id === visiteId);
  if (existing) {
    Object.assign(existing, visite);
  } else {
    g.visites.push(visite);
  }

  // Mise à jour automatique de la dernière visite + relance sur le garage
  const dates = g.visites.map(v => v.date).sort().reverse();
  if (dates.length) g.derniere = dates[0];
  if (visite.relance) g.relance = visite.relance;
  if (g.statut === 'a-visiter') g.statut = 'visite';

  save();
  closeModal('modal-visite');
  renderView();
}

function deleteVisite(garageId, visiteId) {
  if (!confirm('Supprimer cette visite ?')) return;
  const g = data.garages.find(x => x.id === garageId);
  if (!g) return;
  g.visites = (g.visites || []).filter(v => v.id !== visiteId);
  save();
  closeModal('modal-detail');
  openDetail(garageId);
  renderView();
}

function openModalSecteur() { openModal('modal-secteur'); document.getElementById('s-nom').value = ''; }

function saveSecteur() {
  const nom = document.getElementById('s-nom').value.trim();
  if (!nom) { alert('Nom du secteur obligatoire.'); return; }
  if (data.secteurs.includes(nom)) { alert('Ce secteur existe déjà.'); return; }
  data.secteurs.push(nom);
  save();
  closeModal('modal-secteur');
  renderView();
}

function deleteSecteur(nom) {
  const n = data.garages.filter(g => g.secteur === nom).length;
  if (n > 0 && !confirm(`Ce secteur contient ${n} garage(s). Ils seront déplacés vers "Autre". Continuer ?`)) return;
  data.garages.forEach(g => { if (g.secteur === nom) g.secteur = 'Autre'; });
  data.secteurs = data.secteurs.filter(s => s !== nom);
  if (!data.secteurs.includes('Autre')) data.secteurs.push('Autre');
  save();
  renderView();
}

/* ============================================================
   EXPORT / IMPORT
   ============================================================ */
function exportJSON() {
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  dlBlob(blob, `ep2a-commercial-${todayStr()}.json`);
}

function exportCSV() {
  const cols = ['Nom','Contact','Téléphone','Email','Adresse','Ville','Secteur','Type','Potentiel','Statut','Dernière visite','Prochaine relance','Produits','Besoins','Observations'];
  const rows = data.garages.map(g => [
    g.nom, g.contact, g.tel, g.email, g.adresse, g.ville, g.secteur,
    typeLabel(g.type), potentielLabel(g.potentiel), statutLabel(g.statut),
    g.derniere, g.relance, g.produits, g.besoins, g.obs
  ].map(v => `"${(v||'').replace(/"/g,'""')}"`));
  const csv = '\uFEFF' + [cols.map(c=>`"${c}"`), ...rows].map(r=>r.join(';')).join('\r\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  dlBlob(blob, `ep2a-commercial-${todayStr()}.csv`);
}

function dlBlob(blob, name) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = name;
  a.click();
  URL.revokeObjectURL(a.href);
}

function triggerImport() { document.getElementById('import-file').click(); }

function importJSON(e) {
  const file = e.target.files[0]; if (!file) return;
  const r = new FileReader();
  r.onload = ev => {
    try {
      const imported = JSON.parse(ev.target.result);
      if (!imported.garages || !imported.secteurs) throw new Error('Format invalide');
      if (!confirm(`Importer ${imported.garages.length} garage(s) ? Les données actuelles seront remplacées.`)) return;
      data = imported;
      save();
      renderView();
      alert('Import réussi !');
    } catch(err) { alert('Erreur lors de l\'import : ' + err.message); }
  };
  r.readAsText(file);
  e.target.value = '';
}

function openModal(id)  { document.getElementById(id).classList.remove('hidden'); }
function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

// Fermer modale en cliquant sur le fond
document.addEventListener('click', e => {
  if (e.target.classList.contains('modal-backdrop')) {
    e.target.classList.add('hidden');
  }
});

function todayStr() { return new Date().toISOString().split('T')[0]; }

function formatDate(d) {
  if (!d) return '';
  const [y,m,j] = d.split('-');
  return `${j}/${m}/${y}`;
}

function escHtml(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function typeLabel(t) {
  return { prospect: 'Prospect', actif: 'Client actif', ancien: 'Ancien client' }[t] || t;
}
function statutLabel(s) {
  return { 'a-visiter':'À visiter', visite:'Visité', 'a-relancer':'À relancer', commande:'Commande', regulier:'Régulier' }[s] || s;
}
function potentielLabel(p) {
  return { faible:'Faible', moyen:'Moyen', fort:'Fort' }[p] || p;
}

/* Sauvegarde automatique de sécurité : à chaque fermeture/changement d'onglet */
window.addEventListener('beforeunload', save);
document.addEventListener('visibilitychange', () => { if (document.hidden) save(); });
